name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            install: |
              sudo apt-get update
              sudo apt-get install -y tmux
          - name: linux-arm64
            os: ubuntu-24.04-arm
            install: |
              sudo apt-get update
              sudo apt-get install -y tmux
          - name: macos-x86_64
            os: macos-15-intel
            install: |
              brew install tmux
          - name: macos-arm64
            os: macos-15
            install: |
              brew install tmux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: ${{ matrix.install }}

      - name: Run integration tests
        run: bash tests/tmux_power_test.sh
